appId: com.ducktesinferno.launcher
productName: "Duck-te's Inferno Launcher"

directories:
  buildResources: resources
  output: dist-build

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Duck-te's Inferno"

win:
  target:
    - nsis
  icon: resources/icon.ico
  signAndEditExecutable: false

publish:
  provider: github
  owner: JoshT64
  repo: duck-tes-inferno-launcher
  releaseType: release
